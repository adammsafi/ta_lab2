# CTF Cross-Asset Composite Configuration
# Used by refresh_ctf_composites.py
# Phase 98, Plan 03: Cross-asset CTF composite signals.
#
# Three composite types:
#   sentiment    - cross-asset mean (primary) + PCA first component (research)
#   relative_value - cross-sectional z-score per timestamp
#   leader_follower - lagged cross-correlation scoring

composites:
  sentiment_mean:
    method: cross_asset_mean
    description: "Cross-asset mean of promoted CTF features (primary actionable signal)"
    min_assets: 3

  sentiment_pca:
    method: pca_1
    description: "PCA first component of promoted CTF features (research column)"
    min_assets: 5
    pca_variance_threshold: 0.1

  relative_value:
    method: cs_zscore
    description: "Cross-sectional z-score of CTF features per timestamp"
    min_assets: 3

  leader_follower:
    method: lagged_corr
    description: "Lagged cross-correlation score identifying leaders vs followers"
    lags: [1, 3, 5]
    min_assets: 3
    top_n_leaders: 10

feature_source: feature_selection_yaml
base_tfs: ["1D"]
venue_id: 1

materialize_to_features:
  - sentiment_mean
  - relative_value
