  # =========================================================================
  # CATEGORY B: AMA indicator variants
  # Sourced from cmc_ama_multi_tf_u (filtered by indicator + params_hash).
  # Naming: ama_{indicator}_{label_slug}_{column}
  #
  # AMA params_hash values (first 8 chars of MD5):
  #   KAMA(10,2,30) = de1106d5  (er_period=10, fast=2, slow=30)
  #   KAMA(5,2,15)  = 987fc105  (er_period=5, fast=2, slow=15)
  #   KAMA(20,2,50) = 8545aeed  (er_period=20, fast=2, slow=50)
  #   DEMA(9)       = 514ffe35  (period=9)
  #   DEMA(10)      = 018899b6  (period=10)
  #   DEMA(21)      = d47fe5cc  (period=21)
  #   DEMA(50)      = a4b71eb4  (period=50)
  #   DEMA(200)     = 0fca19a1  (period=200)
  #   TEMA(9)       = 514ffe35  (period=9) -- same hash as DEMA(9), differs by indicator
  #   TEMA(10)      = 018899b6  (period=10)
  #   TEMA(21)      = d47fe5cc  (period=21)
  #   TEMA(50)      = a4b71eb4  (period=50)
  #   TEMA(200)     = 0fca19a1  (period=200)
  #   HMA(9)        = 514ffe35  (period=9)
  #   HMA(10)       = 018899b6  (period=10)
  #   HMA(21)       = d47fe5cc  (period=21)
  #   HMA(50)       = a4b71eb4  (period=50)
  #   HMA(200)      = 0fca19a1  (period=200)
  # =========================================================================

  # -------------------------------------------------------------------------
  # KAMA variants: 3 param sets, 2 columns each (ama, er)
  # -------------------------------------------------------------------------

  ama_kama_10_2_30_value:
    lifecycle: experimental
    description: "KAMA(10,2,30) value -- adaptive MA level"
    compute:
      mode: inline
      expression: "ama"
    inputs:
      - table: cmc_ama_multi_tf_u
        columns: [ama]
        filters:
          indicator: kama
          params_hash: de1106d5
    tags: [ama, kama, trend]

  ama_kama_10_2_30_er:
    lifecycle: experimental
    description: "KAMA(10,2,30) Efficiency Ratio -- trending strength (0=noise, 1=trend)"
    compute:
      mode: inline
      expression: "er"
    inputs:
      - table: cmc_ama_multi_tf_u
        columns: [er]
        filters:
          indicator: kama
          params_hash: de1106d5
    tags: [ama, kama, momentum]

  ama_kama_5_2_15_value:
    lifecycle: experimental
    description: "KAMA(5,2,15) fast value -- adaptive MA level"
    compute:
      mode: inline
      expression: "ama"
    inputs:
      - table: cmc_ama_multi_tf_u
