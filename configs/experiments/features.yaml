  # =========================================================================
  # CATEGORY C: EMA crossover features
  #
  # SKIPPED: ExperimentRunner._compute_feature for dotpath mode calls
  # fn(input_df) with no kwargs support. Two inputs from cmc_ema_multi_tf_u
  # with different period filters would both produce an 'ema' column, causing
  # a name collision on inner join. Additionally, a compute function that
  # loads data from DB requires a connection object not available in dotpath
  # fn(input_df) signature.
  #
  # Resolution: EMA crossovers are better implemented as inline features on
  # cmc_features once EMA spread columns are added to that table, or as a
  # separate ExperimentRunner enhancement (support column renaming on multi-
  # input merge). Deferred to Phase 55-04 (ExperimentRunner enhancement).
  # =========================================================================

  # =========================================================================
  # CATEGORY D: Adaptive RSI
  # =========================================================================

  adaptive_rsi_normalized:
    lifecycle: experimental
    description: "RSI(14) normalized by rolling 20th/80th percentile window (100-bar)"
    compute:
      mode: inline
      expression: "(rsi_14 - rsi_14.rolling(100).quantile(0.20)) / (rsi_14.rolling(100).quantile(0.80) - rsi_14.rolling(100).quantile(0.20) + 1e-10)"
    inputs:
      - table: cmc_ta_daily
        columns: [rsi_14]
    tags: [rsi, adaptive, momentum]
