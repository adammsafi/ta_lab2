        columns: [macd_8_17, macd_signal_9_fast]
    tags: [canonical, ta, macd, fast, derived]

  canonical_stoch_cross:
    lifecycle: experimental
    description: "Stochastic %K minus %D (cross direction indicator) from features"
    compute:
      mode: inline
      expression: "stoch_k_14 - stoch_d_3"
    inputs:
      - table: features
        columns: [stoch_k_14, stoch_d_3]
    tags: [canonical, ta, stochastic, derived]

  canonical_rsi_divergence:
    lifecycle: experimental
    description: "RSI(7) minus RSI(21): short/long RSI divergence signal"
    compute:
      mode: inline
      expression: "rsi_7 - rsi_21"
    inputs:
      - table: features
        columns: [rsi_7, rsi_21]
    tags: [canonical, ta, rsi, derived]

  canonical_ret_vol_adj:
    lifecycle: experimental
    description: "Arithmetic return adjusted by Parkinson vol (ret/vol ratio)"
    compute:
      mode: inline
      expression: "ret_arith / (vol_parkinson_20 + 1e-10)"
    inputs:
      - table: features
        columns: [ret_arith, vol_parkinson_20]
    tags: [canonical, returns, vol, derived]

  canonical_vol_gk_20_log:
    lifecycle: experimental
    description: "Log of Garman-Klass 20-bar vol (log-normal vol distribution)"
    compute:
      mode: inline
      expression: "np.log(vol_gk_20 + 1e-10)"
    inputs:
      - table: features
        columns: [vol_gk_20]
    tags: [canonical, vol, garman_klass, derived]

  canonical_vol_parkinson_20_log:
    lifecycle: experimental
    description: "Log of Parkinson 20-bar vol (log-normal distribution)"
    compute:
      mode: inline
      expression: "np.log(vol_parkinson_20 + 1e-10)"
    inputs:
      - table: features
        columns: [vol_parkinson_20]
    tags: [canonical, vol, parkinson, derived]

  canonical_atr_pct:
    lifecycle: experimental
    description: "ATR(14) as percentage of close price (normalized ATR)"
    compute:
      mode: inline
      expression: "atr_14 / (close + 1e-10)"
    inputs:
      - table: features
        columns: [atr_14, close]
    tags: [canonical, vol, atr, derived]

  canonical_bb_width_rel:
    lifecycle: experimental
    description: "Bollinger Band width relative to ATR (band width normalized by ATR)"
    compute:
      mode: inline
      expression: "bb_width_20 / (atr_14 + 1e-10)"
    inputs:
      - table: features
        columns: [bb_width_20, atr_14]
    tags: [canonical, ta, bollinger, derived]

  canonical_adx_rsi_combo:
    lifecycle: experimental
    description: "ADX times RSI(14) centered: trend-strength-weighted momentum"
    compute:
      mode: inline
      expression: "adx_14 * (rsi_14 - 50) / 50"
    inputs:
      - table: features
        columns: [adx_14, rsi_14]
    tags: [canonical, ta, adx, rsi, derived]

  canonical_vol_rs_ratio_126_20:
    lifecycle: experimental
    description: "Rogers-Satchell long/short vol ratio 126/20: mean reversion signal"
    compute:
      mode: inline
      expression: "vol_rs_126 / (vol_rs_20 + 1e-10)"
    inputs:
      - table: features
        columns: [vol_rs_126, vol_rs_20]
    tags: [canonical, vol, rogers_satchell, ratio, reversion]

  canonical_ret_arith_roll_zscore_diff:
    lifecycle: experimental
    description: "Difference of 30/365-bar roll ret z-scores: short vs long momentum"
    compute:
      mode: inline
      expression: "ret_arith_roll_zscore_30 - ret_arith_roll_zscore_365"
    inputs:
      - table: features
        columns: [ret_arith_roll_zscore_30, ret_arith_roll_zscore_365]
    tags: [canonical, returns, roll, zscore, momentum, derived]

  canonical_vol_gk_log_ratio:
    lifecycle: experimental
    description: "Log ratio of GK 20/126 vols: volatility regime transition signal"
    compute:
      mode: inline
      expression: "np.log(vol_gk_20 + 1e-10) - np.log(vol_gk_126 + 1e-10)"
    inputs:
      - table: features
        columns: [vol_gk_20, vol_gk_126]
    tags: [canonical, vol, garman_klass, log, ratio, derived]

  # =========================================================================
  # EXPRESSION-MODE FACTORS (Phase 60)
  # Evaluated by ta_lab2.ml.expression_engine.evaluate_expression().
  # Expressions use $col syntax mapped to DataFrame columns at runtime.
  # Operators: EMA, Ref, Delta, Mean, Std, WMA, Max, Min, Rank, Abs, Sign,
  #            Log, Corr, Slope, Skew, Kurt — defined in OPERATOR_REGISTRY.
  # =========================================================================

  macd_signal:
    lifecycle: experimental
    description: "MACD signal computed from EMA(12)/EMA(26) ratio minus 1 (expression mode)"
    compute:
      mode: expression
      expression: "EMA($close, 12) / EMA($close, 26) - 1"
    inputs:
      - table: price_bars_multi_tf_u
        columns: [close]
    tags: [momentum, macd]

  momentum_5d:
    lifecycle: experimental
    description: "5-bar price momentum: close / Ref(close, 5) - 1 (expression mode)"
    compute:
      mode: expression
      expression: "$close / Ref($close, 5) - 1"
    inputs:
      - table: price_bars_multi_tf_u
        columns: [close]
    tags: [momentum]

  vol_ratio_expr:
    lifecycle: experimental
    description: "Volatility ratio: Std(close, fast) / Std(close, slow) with param sweep (expression mode)"
    compute:
      mode: expression
      expression: "Std($close, {fast}) / Std($close, {slow})"
    params:
      fast: [5, 10]
      slow: [20, 30]
    inputs:
      - table: price_bars_multi_tf_u
        columns: [close]
    tags: [vol, ratio]

  mean_reversion_z:
    lifecycle: experimental
    description: "Z-score of close relative to 20-bar mean and std: mean reversion signal (expression mode)"
    compute:
      mode: expression
      expression: "($close - Mean($close, 20)) / (Std($close, 20) + 1e-10)"
    inputs:
      - table: price_bars_multi_tf_u
        columns: [close]
    tags: [mean_reversion, zscore]

  price_rank:
    lifecycle: experimental
    description: "Percentile rank of close price in cross-sectional universe (expression mode)"
    compute:
      mode: expression
      expression: "Rank($close)"
    inputs:
      - table: price_bars_multi_tf_u
        columns: [close]
    tags: [rank, cross_sectional]
