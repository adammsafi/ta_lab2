# nginx reverse proxy configuration for ta_lab2 Streamlit dashboard
# Managed by setup_nginx_ssl.sh — DOMAIN_PLACEHOLDER is replaced by sed during setup.
#
# Anti-patterns avoided (see Phase 114 research):
#   - auth_basic NOT in location block (breaks WebSocket auth handshake)
#   - WebSocket headers in root location / NOT in separate /_stcore/stream block
#     (Streamlit's internal path can change across versions)
#   - proxy_buffering off is REQUIRED — omitting it causes infinite "Please wait..." spinner

# HTTP — redirect everything to HTTPS, except certbot ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_PLACEHOLDER;

    # Allow certbot HTTP-01 challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy to Streamlit with basic auth
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name DOMAIN_PLACEHOLDER;

    # Let's Encrypt certificates (populated by certbot)
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Basic auth at SERVER level — must NOT be inside location block.
    # Placing auth_basic inside a location block causes WebSocket upgrade requests
    # to fail because the browser sends credentials on the HTTP upgrade but nginx
    # re-evaluates auth per-location, breaking the handshake.
    auth_basic "ta_lab2 Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Root location — all traffic (HTTP and WebSocket) proxied to Streamlit
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # WebSocket upgrade — must be in the same location as proxy_pass
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forwarding headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # REQUIRED for Streamlit: disabling buffering allows Server-Sent Events
        # and streaming updates to reach the browser immediately.
        # Omitting this causes the infinite "Please wait..." spinner.
        proxy_buffering off;

        # Long timeouts for persistent WebSocket connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
