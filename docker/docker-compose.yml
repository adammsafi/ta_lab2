# Docker Compose for ta_lab2 MCP Memory Server + Qdrant
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# DATA: Qdrant data lives at C:/Users/asafi/Documents/ProjectTT/ChatGPT/20251228/out/qdrant_data
# This bind mount preserves the existing 3,763+ memories from the standalone Qdrant container.
# Stop the standalone container before starting compose: docker stop qdrant

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - C:/Users/asafi/Documents/ProjectTT/ChatGPT/20251228/out/qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/tcp/localhost/6333 <<< \"\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  memory-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_SERVER_MODE=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    env_file:
      - path: .env
        required: false
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
