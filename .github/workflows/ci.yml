name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[orchestrator,dev]"

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Run Phase 22 validation tests (no DB)
        run: |
          python -m pytest tests/test_bar_validation.py tests/test_ema_validation.py -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.9.0"
      - name: Ruff lint
        run: ruff check src/ --output-format=github

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.9.0"
      - name: Ruff format check
        run: ruff format --check src/

  mypy:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install "mypy>=1.14" "pandas-stubs>=2.2"
          pip install -e ".[dev]"
      - name: mypy (features + regimes)
        run: mypy src/ta_lab2/features/ src/ta_lab2/regimes/

  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          PYPROJECT_VER=$(grep -oP '^version = "\K[^"]+' pyproject.toml)
          README_VER=$(head -1 README.md | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+')
          MKDOCS_VER=$(grep -oP 'site_name:.*v\K[0-9]+\.[0-9]+\.[0-9]+' mkdocs.yml)
          if [ "$PYPROJECT_VER" != "$README_VER" ] || [ "$PYPROJECT_VER" != "$MKDOCS_VER" ]; then
            echo "::error::Version mismatch: pyproject.toml=$PYPROJECT_VER, README=$README_VER, mkdocs=$MKDOCS_VER"
            exit 1
          fi
          echo "Version consistent: $PYPROJECT_VER"

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs deps
        run: pip install mkdocs "mkdocs-material>=9.0,<9.7" "mkdocstrings[python]>=0.24"
      - name: Build docs (strict)
        run: mkdocs build --strict
